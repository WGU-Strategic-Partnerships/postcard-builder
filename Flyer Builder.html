<style>
  :root { --nav-h: 53px; }
  html, body { margin: 0; padding: 0; background: #f4f6f9; font-family: 'Jost', sans-serif; color: #001731; }
  * { box-sizing: border-box; }

  /* ===== Global nav (top tab bar) ===== */
  .top-nav { display: flex; align-items: center; height: var(--nav-h); padding: 0 24px; background: #fff; border-bottom: 1px solid #e0e6ee; gap: 28px; flex-shrink: 0; box-shadow: 0 1px 0 rgba(0,23,49,0.04); position: sticky; top: 0; z-index: 50; }
  .top-nav-brand { display: flex; align-items: center; gap: 8px; font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 13px; color: #001731; text-transform: uppercase; letter-spacing: 0.08em; flex-shrink: 0; text-decoration: none; transition: color 0.12s; }
  .top-nav-brand:hover { color: #0070F0; }
  .top-nav-brand .brand-dot { width: 10px; height: 10px; border-radius: 50%; background: #97E152; box-shadow: 0 0 0 3px rgba(151,225,82,0.18); }
  .top-nav-tabs { display: flex; gap: 0; flex: 1; align-self: stretch; align-items: stretch; }
  .nav-tab { display: flex; align-items: center; padding: 0 16px; font-size: 12px; font-weight: 600; color: #264468; text-decoration: none; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 2px solid transparent; transition: color 0.12s, border-color 0.12s; }
  .nav-tab:hover { color: #0070F0; }
  .nav-tab.active { color: #0070F0; border-bottom-color: #0070F0; }
  .top-nav-right { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
  .wgu-tools-btn { display: inline-flex; align-items: center; padding: 6px 12px; border-radius: 999px; background: rgba(0, 40, 85, 0.04); border: 1px solid rgba(0, 40, 85, 0.10); font-family: 'Jost', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 0.04em; color: #002855; text-transform: uppercase; text-decoration: none; transition: background 0.12s, border-color 0.12s; }
  .wgu-tools-btn:hover { background: rgba(0, 40, 85, 0.08); border-color: rgba(0, 40, 85, 0.20); }
  .wgu-tools-btn .dot-tools { color: #0070F0; }
  .nav-admin { font-size: 11px; color: #0070F0; text-decoration: none; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 7px 14px; border: 1px solid #c7d1de; border-radius: 4px; transition: all 0.12s; }
  .nav-admin:hover { background: #f7faff; border-color: #0070F0; color: #0057C2; }

  .app { display: grid; grid-template-columns: 460px 1fr; min-height: calc(100vh - var(--nav-h)); }

  .form-panel { background: #fff; border-right: 1px solid #e0e6ee; overflow-y: auto; height: calc(100vh - var(--nav-h)); padding: 0 0 80px; }
  .form-header { padding: 24px 28px 18px; border-bottom: 1px solid #e0e6ee; background: #fff; color: #001731; position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 0 rgba(0,23,49,0.04); }
  .form-header h1 { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 22px; text-transform: uppercase; letter-spacing: 0.02em; margin: 0 0 4px; color: #001731; }
  .form-header p { margin: 0; font-size: 12px; color: #264468; line-height: 1.4; }

  .section { padding: 22px 28px 18px; border-bottom: 1px solid #eef2f6; }
  .section h2 { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.16em; color: #0070F0; margin: 0 0 16px; display: flex; align-items: center; gap: 8px; }
  .section h2 .step-num { background: #0070F0; color: #fff; width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-family: 'Jost', sans-serif; font-weight: 700; }

  .field { margin-bottom: 14px; }
  .field-label { display: flex; justify-content: space-between; align-items: baseline; font-size: 12px; font-weight: 600; color: #264468; margin-bottom: 6px; }
  .field-counter { font-size: 11px; color: #A7A7A7; font-variant-numeric: tabular-nums; }

  input[type="text"], input[type="url"], textarea { width: 100%; padding: 9px 11px; border: 1px solid #c7d1de; border-radius: 6px; font-family: inherit; font-size: 14px; color: #001731; background: #fff; transition: border-color 0.15s; }
  input:focus, textarea:focus { outline: none; border-color: #0070F0; box-shadow: 0 0 0 3px rgba(0,112,240,0.15); }
  textarea { resize: vertical; min-height: 70px; line-height: 1.4; }

  .picklist { display: flex; flex-direction: column; gap: 6px; }
  .pick-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border: 1px solid #e0e6ee; border-radius: 6px; cursor: pointer; transition: all 0.12s; background: #fff; }
  .pick-item:hover { border-color: #0070F0; background: #f7faff; }
  .pick-item.selected { border-color: #0070F0; background: #eef6ff; box-shadow: 0 0 0 1px #0070F0 inset; }
  .pick-item.disabled { opacity: 0.45; cursor: not-allowed; }
  .pick-checkbox { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid #c7d1de; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: #fff; margin-top: 1px; }
  .pick-item.selected .pick-checkbox { background: #0070F0; border-color: #0070F0; }
  .pick-checkbox svg { display: none; }
  .pick-item.selected .pick-checkbox svg { display: block; }
  .pick-text { flex: 1; font-size: 13px; color: #001731; line-height: 1.4; min-width: 0; }
  .pick-text strong { font-weight: 700; color: #0070F0; }
  .pick-text small { display: block; font-size: 11px; color: #264468; margin-top: 2px; line-height: 1.4; }
  .pick-order { width: 22px; height: 22px; border-radius: 50%; background: #97E152; color: #001731; font-weight: 700; font-size: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .pick-help { font-size: 11px; color: #A7A7A7; margin: 4px 0 8px; }

  .qr-toggle { display: flex; gap: 4px; background: #eef2f6; border-radius: 6px; padding: 3px; margin-bottom: 8px; }
  .qr-toggle button { flex: 1; border: 0; background: transparent; padding: 6px 8px; font-size: 12px; font-weight: 600; color: #264468; border-radius: 4px; cursor: pointer; font-family: inherit; }
  .qr-toggle button.active { background: #fff; color: #0070F0; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }

  .upload-zone { border: 1.5px dashed #c7d1de; border-radius: 6px; padding: 16px; text-align: center; cursor: pointer; background: #f9fbfd; transition: all 0.12s; }
  .upload-zone:hover { border-color: #0070F0; background: #eef6ff; }
  .upload-zone.has-file { border-style: solid; border-color: #97E152; background: #f4fce4; }
  .upload-zone .upload-label { font-size: 13px; font-weight: 600; color: #264468; }
  .upload-zone .upload-hint { font-size: 11px; color: #A7A7A7; margin-top: 3px; }

  .preview-panel { padding: 32px; overflow: auto; height: calc(100vh - var(--nav-h)); background: #f4f6f9; }
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
  .btn { border: 0; padding: 10px 16px; border-radius: 6px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 0.12s; }
  .btn-primary { background: #0070F0; color: #fff; }
  .btn-primary:hover { background: #0057C2; }
  .btn-secondary { background: #fff; color: #001731; border: 1px solid #c7d1de; }
  .btn-secondary:hover { background: #f4f6f9; }
  .btn-success { background: #97E152; color: #001731; }
  .btn-success:hover { background: #82c93f; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #001731; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 13px; box-shadow: 0 4px 16px rgba(0,0,0,0.2); z-index: 100; }

  .help-banner { background: #eef6ff; border: 1px solid #b8d8fc; border-radius: 6px; padding: 12px 14px; margin-bottom: 20px; font-size: 12px; color: #002855; line-height: 1.5; }

  /* Stack front + back vertically; each fills the panel width at native or
     scaled-down ratio so nothing crops. Container queries compute scale
     based on the actual available width. */
  .preview-row { display: flex; flex-direction: column; gap: 32px; align-items: center; container-type: inline-size; }
  .preview-side { display: flex; flex-direction: column; align-items: center; gap: 10px; width: min(100%, 850px); }
  .preview-label { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: #264468; font-weight: 600; }
  .card-frame-wrap { width: 100%; aspect-ratio: 850 / 1100; overflow: hidden; position: relative; background: #fff; border-radius: 4px; box-shadow: 0 12px 36px rgba(0,23,49,0.18); }
  .card-frame { position: absolute; top: 0; left: 0; width: 850px; height: 1100px; transform-origin: top left; transform: scale(min(1, calc(100cqw / 850px))); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>

<script type="text/babel">
const sb = window.supabase.createClient(
  window.WGU_SUPABASE.url,
  window.WGU_SUPABASE.publishableKey,
  { auth: { persistSession: false, detectSessionInUrl: false } }
);

const BUILDER_ID = 'flyer';

const LIMITS = {
  partnerName: 60,
  url: 100,
};

const DEFAULTS = {
  partnerName: '',
  url: 'wgu.edu/partnerships',
  qrMode: 'url',
  qrImage: '',
  heroImage: '',
  benefitIds: ['b1', 'b2', 'b3', 'b4', 'b5'],
  factIds: ['f1', 'f2', 'f3', 'f4', 'f5'],
  statIds: ['s1', 's2', 's3'],
};

async function fetchFlyerLibrary() {
  const { data, error } = await sb.from('library_items')
    .select('section, external_id, content')
    .eq('builder_id', BUILDER_ID)
    .eq('is_active', true)
    .order('sort_order', { ascending: true });
  if (error) throw error;
  const out = { benefits: [], facts: [], stats: [], fixedText: {} };
  for (const row of data || []) {
    if (row.section === 'fixed_text') out.fixedText = row.content || {};
    else if (out[row.section]) out[row.section].push({ id: row.external_id, ...row.content });
  }
  return out;
}

function encodeState(s) { try { return btoa(encodeURIComponent(JSON.stringify(s))); } catch { return ''; } }
function decodeState(s) { try { return JSON.parse(decodeURIComponent(atob(s))); } catch { return null; } }
function loadInitialState() {
  const m = window.location.hash.match(/^#s=(.+)$/);
  if (m) { const d = decodeState(m[1]); if (d) return { ...DEFAULTS, ...d }; }
  return DEFAULTS;
}

function CharCounter({ value, max }) {
  const len = (value || '').length;
  const cls = len > max ? 'over' : (len > max * 0.9 ? 'warn' : '');
  return <span className={`field-counter ${cls}`}>{len}/{max}</span>;
}

function PickItem({ selected, order, disabled, onClick, children }) {
  return (
    <div className={`pick-item ${selected ? 'selected' : ''} ${disabled ? 'disabled' : ''}`} onClick={disabled ? null : onClick}>
      <div className="pick-checkbox">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
          <path d="M2.5 6L5 8.5L9.5 4" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>
      <div className="pick-text">{children}</div>
      {selected && order != null && <div className="pick-order">{order}</div>}
    </div>
  );
}

function App() {
  const [state, setState] = React.useState(loadInitialState);
  const [toast, setToast] = React.useState(null);
  const [lib, setLib] = React.useState(null);
  const [loadError, setLoadError] = React.useState(null);

  const update = (patch) => setState((prev) => ({ ...prev, ...patch }));

  React.useEffect(() => {
    fetchFlyerLibrary().then(setLib).catch((e) => { console.error('Flyer library fetch failed:', e); setLoadError(e.message || 'Failed to load library'); });
  }, []);

  React.useEffect(() => {
    const id = setTimeout(() => {
      const encoded = encodeState(state);
      window.history.replaceState(null, '', `#s=${encoded}`);
    }, 300);
    return () => clearTimeout(id);
  }, [state]);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2400); };

  const renderData = React.useMemo(() => {
    if (!lib) return null;
    return {
      partnerName: state.partnerName,
      url: state.url,
      qrSource: state.qrMode === 'image' ? state.qrImage : state.url,
      heroImage: state.heroImage,
      benefits: state.benefitIds.map((id) => lib.benefits.find((b) => b.id === id)).filter(Boolean),
      facts:    state.factIds.map((id) => lib.facts.find((f) => f.id === id)).filter(Boolean),
      stats:    state.statIds.map((id) => lib.stats.find((s) => s.id === id)).filter(Boolean),
      fixedText: lib.fixedText,
    };
  }, [state, lib]);

  const togglePick = (key, max) => (id) => {
    const cur = state[key] || [];
    if (cur.includes(id)) update({ [key]: cur.filter((x) => x !== id) });
    else if (cur.length < max) update({ [key]: [...cur, id] });
  };
  const toggleBenefit = togglePick('benefitIds', 5);
  const toggleFact    = togglePick('factIds', 5);
  const toggleStat    = togglePick('statIds', 3);

  const onHeroUpload = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => update({ heroImage: reader.result });
    reader.readAsDataURL(file);
  };
  const onQRUpload = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => update({ qrImage: reader.result, qrMode: 'image' });
    reader.readAsDataURL(file);
  };

  const copyShareLink = async () => {
    try { await navigator.clipboard.writeText(window.location.href); showToast('Share link copied — paste into email or SharePoint.'); }
    catch { showToast("Couldn't copy automatically — link is in the URL bar."); }
  };
  const resetAll = () => {
    if (confirm('Reset all fields back to defaults? This will clear your work.')) {
      setState(DEFAULTS);
      window.history.replaceState(null, '', window.location.pathname);
    }
  };

  const exportPDF = async () => {
    if (!window.jspdf || !window.html2canvas) { showToast('PDF tools still loading — try again in a moment.'); return; }
    showToast('Generating PDF…');
    try {
      if (document.fonts && document.fonts.ready) await document.fonts.ready;
      const { jsPDF } = window.jspdf;
      const MARGIN_IN = 0.25;
      const PAGE_W = 8.5;
      const PAGE_H = 11.0;
      const SCALE = 3;

      const pdf = new jsPDF({ unit: 'in', format: [PAGE_W, PAGE_H], orientation: 'portrait', compress: true });
      const cardEls = document.querySelectorAll('.card-frame > div');
      for (let i = 0; i < cardEls.length; i++) {
        if (i > 0) pdf.addPage([PAGE_W, PAGE_H], 'portrait');
        const canvas = await window.html2canvas(cardEls[i], { scale: SCALE, backgroundColor: null, useCORS: true, logging: false });
        pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG',
          MARGIN_IN, MARGIN_IN, PAGE_W - MARGIN_IN * 2, PAGE_H - MARGIN_IN * 2,
          undefined, 'FAST');
      }
      const slug = (state.partnerName || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
      pdf.save(`wgu-tuition-flyer${slug ? '-' + slug : ''}.pdf`);
      showToast('PDF saved.');
    } catch (e) {
      console.error('PDF export failed:', e);
      showToast('PDF export failed — see console.');
    }
  };

  if (loadError) {
    return (
      <div style={{ padding: 40, fontFamily: "'Jost', sans-serif", color: '#001731', maxWidth: 520 }}>
        <h2 style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 700, fontSize: 22, color: '#dc2626', textTransform: 'uppercase' }}>Couldn't load library</h2>
        <p style={{ fontSize: 14, color: '#264468' }}>The flyer builder couldn't reach Supabase.</p>
        <pre style={{ background: '#f4f6f9', padding: 12, borderRadius: 6, fontSize: 12, color: '#dc2626', overflowX: 'auto' }}>{loadError}</pre>
      </div>
    );
  }
  if (!lib || !renderData) {
    return <div style={{ padding: 40, fontFamily: "'Jost', sans-serif", color: '#264468', fontSize: 14 }}>Loading library content…</div>;
  }

  return (
    <div className="app">
      <div className="form-panel">
        <div className="form-header">
          <h1>Tuition Benefits Flyer</h1>
          <p>Two-sided 8.5×11" flyer · employer-focused front, fast-facts back. Edit, preview live, export to PDF.</p>
        </div>

        {/* 1. Partner & URL */}
        <div className="section">
          <h2><span className="step-num">1</span>Partner & URL</h2>
          <div className="field">
            <div className="field-label">
              <span>Partner organization <span style={{ color: '#A7A7A7', fontWeight: 400 }}>(optional, used in filename)</span></span>
              <CharCounter value={state.partnerName} max={LIMITS.partnerName} />
            </div>
            <input type="text" value={state.partnerName} onChange={(e) => update({ partnerName: e.target.value })} placeholder="e.g. OhioHealth" />
          </div>
          <div className="field">
            <div className="field-label">
              <span>URL <span style={{ color: '#A7A7A7', fontWeight: 400 }}>(footer + QR target)</span></span>
              <CharCounter value={state.url} max={LIMITS.url} />
            </div>
            <input type="text" value={state.url} onChange={(e) => update({ url: e.target.value })} placeholder="wgu.edu/partnerships/your-event" />
          </div>
        </div>

        {/* 2. Hero image */}
        <div className="section">
          <h2><span className="step-num">2</span>Hero image <span style={{ fontSize: 11, color: '#A7A7A7', fontWeight: 500, letterSpacing: 0 }}>· optional</span></h2>
          <label className={`upload-zone ${state.heroImage ? 'has-file' : ''}`}>
            <div className="upload-label">{state.heroImage ? '✓ Hero image loaded — click to replace' : 'Click to upload hero image'}</div>
            <div className="upload-hint">Portrait of a person works best — sits on the right side of the front hero.</div>
            <input type="file" accept="image/*" style={{ display: 'none' }} onChange={onHeroUpload} />
          </label>
          {state.heroImage && (
            <button className="btn btn-secondary" style={{ marginTop: 8, fontSize: 12 }} onClick={() => update({ heroImage: '' })}>Remove image</button>
          )}
        </div>

        {/* 3. QR Code */}
        <div className="section">
          <h2><span className="step-num">3</span>QR Code</h2>
          <div className="qr-toggle">
            <button className={state.qrMode === 'url' ? 'active' : ''} onClick={() => update({ qrMode: 'url' })}>Generate from URL</button>
            <button className={state.qrMode === 'image' ? 'active' : ''} onClick={() => update({ qrMode: 'image' })}>Upload image</button>
          </div>
          {state.qrMode === 'image' && (
            <label className={`upload-zone ${state.qrImage ? 'has-file' : ''}`}>
              <div className="upload-label">{state.qrImage ? '✓ QR image loaded — click to replace' : 'Click to upload QR image'}</div>
              <div className="upload-hint">PNG, JPG, or SVG · square aspect</div>
              <input type="file" accept="image/*" style={{ display: 'none' }} onChange={onQRUpload} />
            </label>
          )}
          {state.qrMode === 'url' && <div className="pick-help">A QR will be generated from your URL automatically and shown on both sides.</div>}
        </div>

        {/* 4. Benefits picklist */}
        <div className="section">
          <h2><span className="step-num">4</span>Benefits <span style={{ fontSize: 11, color: '#A7A7A7', fontWeight: 500, letterSpacing: 0 }}>· pick 5</span></h2>
          <div className="pick-help">Selected: {state.benefitIds.length} of 5 · order reflects display order on the front</div>
          <div className="picklist">
            {lib.benefits.map((b) => {
              const idx = state.benefitIds.indexOf(b.id);
              const selected = idx >= 0;
              const disabled = !selected && state.benefitIds.length >= 5;
              return (
                <PickItem key={b.id} selected={selected} order={selected ? idx + 1 : null} disabled={disabled} onClick={() => toggleBenefit(b.id)}>
                  <strong>{b.title}</strong>
                  <small>{b.description}</small>
                </PickItem>
              );
            })}
          </div>
        </div>

        {/* 5. Stats */}
        <div className="section">
          <h2><span className="step-num">5</span>Back Stats Strip <span style={{ fontSize: 11, color: '#A7A7A7', fontWeight: 500, letterSpacing: 0 }}>· pick 3</span></h2>
          <div className="pick-help">Selected: {state.statIds.length} of 3 · the row of big numbers near the top of the back</div>
          <div className="picklist">
            {lib.stats.map((s) => {
              const idx = state.statIds.indexOf(s.id);
              const selected = idx >= 0;
              const disabled = !selected && state.statIds.length >= 3;
              return (
                <PickItem key={s.id} selected={selected} order={selected ? idx + 1 : null} disabled={disabled} onClick={() => toggleStat(s.id)}>
                  <strong>{s.num}</strong> <span style={{ color: '#264468' }}>· {s.label}</span>
                </PickItem>
              );
            })}
          </div>
        </div>

        {/* 6. Fast facts */}
        <div className="section">
          <h2><span className="step-num">6</span>Back Fast Facts <span style={{ fontSize: 11, color: '#A7A7A7', fontWeight: 500, letterSpacing: 0 }}>· pick 5</span></h2>
          <div className="pick-help">Selected: {state.factIds.length} of 5 · numbered list on the back</div>
          <div className="picklist">
            {lib.facts.map((f) => {
              const idx = state.factIds.indexOf(f.id);
              const selected = idx >= 0;
              const disabled = !selected && state.factIds.length >= 5;
              return (
                <PickItem key={f.id} selected={selected} order={selected ? idx + 1 : null} disabled={disabled} onClick={() => toggleFact(f.id)}>
                  {f.text}
                </PickItem>
              );
            })}
          </div>
        </div>
      </div>

      <div className="preview-panel">
        <div className="toolbar">
          <button className="btn btn-success" onClick={exportPDF}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3.5 5.5V2h7v3.5M3 9.5h8M2 5.5h10v5h-2v2H4v-2H2v-5z" stroke="currentColor" strokeWidth="1.3" fill="none" strokeLinejoin="round"/></svg>
            Save as PDF
          </button>
          <button className="btn btn-primary" onClick={copyShareLink}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5.5 8.5L8.5 5.5M5.5 5.5L4 7a2.12 2.12 0 003 3l1.5-1.5M8.5 8.5L10 7a2.12 2.12 0 00-3-3L5.5 5.5" stroke="currentColor" strokeWidth="1.3" fill="none" strokeLinecap="round"/></svg>
            Copy share link
          </button>
          <button className="btn btn-secondary" onClick={resetAll}>Reset</button>
          <div style={{ marginLeft: 'auto', fontSize: 11, color: '#A7A7A7' }}>8.5 × 11 in × 2 sides · 850 × 1100 px each</div>
        </div>

        <div className="help-banner">
          <strong>How to use:</strong> Pick 5 benefits → 3 stats → 5 facts. Edit on the left, preview updates live. Click <strong>Save as PDF</strong> for a 2-page print-ready file, or <strong>Copy share link</strong> to send your draft to a teammate.
        </div>

        <div className="preview-row">
          <div className="preview-side">
            <div className="preview-label">Front</div>
            <div className="card-frame-wrap"><div className="card-frame"><FlyerFront data={renderData} /></div></div>
          </div>
          <div className="preview-side">
            <div className="preview-label">Back</div>
            <div className="card-frame-wrap"><div className="card-frame"><FlyerBack data={renderData} /></div></div>
          </div>
        </div>
      </div>

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
