<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WGU Library Admin</title>
<link rel="stylesheet" href="source/colors_and_type.css" />
<meta name="ext-resource-dependency" content="assets/swirl-navy.png" data-resource-id="swirlBg" />
<meta name="ext-resource-dependency" content="assets/wgu-wordmark-white.png" data-resource-id="wguLogo" />
<style>
  html, body { margin: 0; padding: 0; background: #f4f6f9; font-family: 'Jost', sans-serif; color: #001731; }
  * { box-sizing: border-box; }

  /* ===== Sign-in screen ===== */
  .signin-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .signin-card { background: #fff; border-radius: 8px; box-shadow: 0 4px 24px rgba(0,23,49,0.08); padding: 40px; max-width: 420px; width: 100%; }
  .signin-card h1 { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 22px; text-transform: uppercase; letter-spacing: 0.04em; color: #001731; margin: 0 0 8px; }
  .signin-card .sub { font-size: 13px; color: #264468; margin: 0 0 24px; line-height: 1.5; }
  .signin-card label { font-size: 12px; font-weight: 600; color: #264468; display: block; margin-bottom: 6px; }
  .signin-card input[type="email"], .signin-card input[type="password"] { width: 100%; padding: 10px 12px; border: 1px solid #c7d1de; border-radius: 6px; font-family: inherit; font-size: 14px; color: #001731; background: #fff; }
  .signin-card input[type="email"]:focus, .signin-card input[type="password"]:focus { outline: none; border-color: #0070F0; box-shadow: 0 0 0 3px rgba(0,112,240,0.15); }
  .signin-card .info-box { background: #eef6ff; border: 1px solid #b8d8fc; border-radius: 6px; padding: 14px; font-size: 13px; color: #002855; line-height: 1.5; margin-bottom: 16px; }
  .signin-card .err-box { background: #fff1f1; border: 1px solid #fbcaca; border-radius: 6px; padding: 12px; font-size: 12px; color: #dc2626; line-height: 1.5; margin-top: 12px; }
  .signin-card .footer-note { font-size: 11px; color: #A7A7A7; margin-top: 24px; line-height: 1.5; }
  .method-toggle { display: flex; gap: 4px; background: #eef2f6; border-radius: 6px; padding: 3px; margin-bottom: 16px; }
  .method-toggle button { flex: 1; border: 0; background: transparent; padding: 8px 10px; font-size: 12px; font-weight: 600; color: #264468; border-radius: 4px; cursor: pointer; font-family: inherit; }
  .method-toggle button.active { background: #fff; color: #0070F0; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  .btn-google { background: #fff; color: #001731; border: 1px solid #c7d1de; padding: 11px 14px; width: 100%; justify-content: center; gap: 10px; font-size: 13px; font-weight: 600; border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; font-family: inherit; transition: all 0.12s; }
  .btn-google:hover:not(:disabled) { background: #f4f6f9; border-color: #0070F0; box-shadow: 0 0 0 3px rgba(0,112,240,0.08); }
  .btn-google:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
  .divider { display: flex; align-items: center; gap: 10px; margin: 16px 0; color: #A7A7A7; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e0e6ee; }

  /* ===== App layout (mirrors builder) ===== */
  .app { display: grid; grid-template-columns: 460px 1fr; min-height: 100vh; }
  .form-panel { background: #fff; border-right: 1px solid #e0e6ee; overflow-y: auto; height: 100vh; padding: 0 0 96px; position: relative; }
  .form-header { padding: 18px 28px 14px; border-bottom: 1px solid #e0e6ee; background: #fff; color: #001731; position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 0 rgba(0,23,49,0.04); }
  .form-header .top-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; }
  .form-header .title-block h1 { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 18px; text-transform: uppercase; letter-spacing: 0.04em; margin: 0 0 3px; color: #001731; }
  .form-header .title-block p { margin: 0; font-size: 11px; color: #264468; line-height: 1.4; }
  .form-header .header-actions { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; flex-shrink: 0; }
  .form-header .user-line { font-size: 10px; color: #A7A7A7; max-width: 160px; text-align: right; word-break: break-all; }
  .form-header .header-actions a, .form-header .header-actions button { font-size: 10px; color: #0070F0; text-decoration: none; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; background: transparent; border: 0; cursor: pointer; padding: 0; font-family: inherit; }
  .form-header .header-actions a:hover, .form-header .header-actions button:hover { text-decoration: underline; }
  .form-header .header-actions button.signout { color: #dc2626; }

  /* Builder picker */
  .builder-picker { margin-top: 12px; display: flex; gap: 6px; align-items: center; }
  .builder-picker label { font-size: 10px; color: #264468; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .builder-picker select { flex: 1; padding: 6px 8px; border: 1px solid #c7d1de; border-radius: 4px; font-family: inherit; font-size: 12px; color: #001731; background: #fff; cursor: pointer; }
  .builder-picker select:focus { outline: none; border-color: #0070F0; box-shadow: 0 0 0 2px rgba(0,112,240,0.15); }

  .section { padding: 22px 28px 18px; border-bottom: 1px solid #eef2f6; }
  .section h2 { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.16em; color: #0070F0; margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }
  .section h2 .step-num { background: #0070F0; color: #fff; width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-family: 'Jost', sans-serif; font-weight: 700; }
  .section h2 .step-num.brand { background: #97E152; color: #001731; }
  .section h2 .meta { font-size: 11px; color: #A7A7A7; font-weight: 500; letter-spacing: 0; text-transform: none; margin-left: auto; }
  .section .help { font-size: 11px; color: #264468; background: #eef6ff; border: 1px solid #b8d8fc; border-radius: 4px; padding: 8px 10px; margin: 0 0 12px; line-height: 1.45; }

  /* ===== Brand-text fields ===== */
  .brand-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .brand-grid .brand-row { display: flex; flex-direction: column; gap: 4px; }
  .brand-grid .brand-row.full { grid-column: 1 / -1; }
  .brand-grid label { font-size: 10px; font-weight: 600; color: #264468; text-transform: uppercase; letter-spacing: 0.06em; }
  .brand-grid input { width: 100%; padding: 8px 10px; border: 1px solid #c7d1de; border-radius: 4px; font-family: inherit; font-size: 13px; color: #001731; background: #fff; }
  .brand-grid input:focus { outline: none; border-color: #0070F0; box-shadow: 0 0 0 2px rgba(0,112,240,0.15); }
  .brand-grid input.sky { color: #0070F0; }
  .brand-grid input.lime { color: #5fa61f; }

  /* ===== Item rows (library editing) ===== */
  .item-list { display: flex; flex-direction: column; gap: 6px; }
  .item { background: #fff; border: 1px solid #e0e6ee; border-radius: 6px; padding: 10px 12px; display: flex; gap: 10px; align-items: flex-start; transition: background 0.12s, border-color 0.12s; }
  .item.is-new { border-color: #97E152; background: #f9fde9; }
  .item.is-deleted { opacity: 0.5; background: #fff5f5; border-color: #fbcaca; border-style: dashed; }
  .item.is-deleted .field-input-wrap input, .item.is-deleted .field-input-wrap textarea { text-decoration: line-through; color: #A7A7A7; pointer-events: none; }
  .item-num { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 16px; color: #0070F0; min-width: 22px; padding-top: 4px; text-align: center; }
  .item.is-new .item-num { color: #5fa61f; }
  .item.is-deleted .item-num { color: #dc2626; text-decoration: line-through; }
  .item-fields { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .field-row { display: flex; gap: 8px; align-items: flex-start; }
  .field-row .field-label { font-size: 9px; color: #A7A7A7; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; min-width: 56px; padding-top: 8px; }
  .field-input-wrap { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .field-input-wrap input, .field-input-wrap textarea { font-family: inherit; font-size: 12.5px; padding: 6px 8px; border: 1px solid #c7d1de; border-radius: 4px; color: #001731; background: #fff; transition: border-color 0.12s; width: 100%; }
  .field-input-wrap input:focus, .field-input-wrap textarea:focus { outline: none; border-color: #0070F0; box-shadow: 0 0 0 2px rgba(0,112,240,0.15); }
  .field-input-wrap textarea { resize: vertical; min-height: 44px; line-height: 1.4; }
  .counter { font-size: 9px; color: #A7A7A7; font-variant-numeric: tabular-nums; align-self: flex-end; margin-top: 1px; }
  .counter.warn { color: #d97706; }
  .counter.over { color: #dc2626; font-weight: 700; }
  .badge { font-size: 9px; padding: 1px 6px; border-radius: 8px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
  .badge-new { background: #97E152; color: #001731; }
  .badge-deleted { background: #dc2626; color: #fff; }
  .badge-edited { background: #fde68a; color: #92400e; }

  .item-actions { display: flex; flex-direction: column; gap: 3px; padding-top: 2px; flex-shrink: 0; }
  .icon-btn { background: transparent; border: 1px solid #e0e6ee; border-radius: 3px; width: 26px; height: 22px; cursor: pointer; color: #264468; display: flex; align-items: center; justify-content: center; padding: 0; transition: all 0.12s; font-family: inherit; font-size: 11px; }
  .icon-btn:hover:not(:disabled) { border-color: #0070F0; color: #0070F0; background: #f7faff; }
  .icon-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .icon-btn.delete:hover:not(:disabled) { border-color: #dc2626; color: #dc2626; background: #fff1f1; }
  .icon-btn.restore { border-color: #97E152; color: #5fa61f; width: auto; padding: 0 8px; font-weight: 700; font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; }
  .icon-btn.restore:hover { background: #f4fce4; color: #001731; }

  /* ===== Buttons ===== */
  .btn { padding: 9px 14px; border-radius: 6px; font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; border: 0; display: inline-flex; align-items: center; gap: 8px; transition: all 0.12s; }
  .btn-primary { background: #0070F0; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #0057C2; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-outline { background: transparent; border: 1px dashed #c7d1de; color: #264468; padding: 8px 14px; }
  .btn-outline:hover:not(:disabled) { border-style: solid; border-color: #0070F0; color: #0070F0; }
  .btn-outline:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-warn { background: #fff; color: #dc2626; border: 1px solid #fbcaca; padding: 8px 14px; }
  .btn-warn:hover:not(:disabled) { background: #fff1f1; border-color: #dc2626; }
  .btn-warn:disabled { opacity: 0.5; cursor: not-allowed; }
  .add-row { margin-top: 10px; }

  /* ===== Sticky save bar ===== */
  .save-bar { position: fixed; left: 0; bottom: 0; width: 460px; background: #fff; border-top: 1px solid #e0e6ee; padding: 12px 20px; display: flex; gap: 8px; align-items: center; box-shadow: 0 -4px 12px rgba(0,23,49,0.06); z-index: 30; min-height: 60px; }
  .save-bar .msg { font-size: 12px; font-weight: 600; color: #001731; flex: 1; line-height: 1.3; }
  .save-bar .msg.saved { color: #5fa61f; display: flex; align-items: center; gap: 6px; }
  .save-bar .msg-detail { font-size: 10px; font-weight: 500; color: #A7A7A7; display: block; margin-top: 1px; }

  /* ===== Preview panel ===== */
  .preview-panel { padding: 24px; overflow: auto; height: 100vh; background: #f4f6f9; }
  .preview-toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; font-size: 11px; color: #264468; }
  .preview-toolbar .pill { background: #fff; border: 1px solid #e0e6ee; padding: 6px 10px; border-radius: 999px; font-weight: 600; }
  .preview-toolbar .live-pill { background: #97E152; color: #001731; border-color: #97E152; }
  .preview-toolbar .draft-pill { background: #fde68a; color: #92400e; border-color: #f6d65a; }
  .preview-help { background: #eef6ff; border: 1px solid #b8d8fc; border-radius: 6px; padding: 10px 14px; margin-bottom: 16px; font-size: 12px; color: #002855; line-height: 1.5; }
  .preview-row { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
  .preview-side { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .preview-label { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: #264468; font-weight: 600; }
  .card-frame { box-shadow: 0 12px 36px rgba(0,23,49,0.18); border-radius: 4px; overflow: hidden; background: #fff; }

  /* ===== Toast & modal ===== */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #001731; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 13px; box-shadow: 0 4px 16px rgba(0,0,0,0.2); z-index: 100; }
  .toast.error { background: #dc2626; }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,23,49,0.4); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 24px; }
  .modal { background: #fff; border-radius: 8px; padding: 32px; max-width: 400px; width: 100%; box-shadow: 0 12px 36px rgba(0,23,49,0.25); }
  .modal h2 { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 18px; text-transform: uppercase; letter-spacing: 0.04em; color: #001731; margin: 0 0 6px; }
  .modal .sub { font-size: 12px; color: #264468; margin: 0 0 16px; }
  .modal label { font-size: 11px; font-weight: 600; color: #264468; display: block; margin-bottom: 6px; margin-top: 12px; }
  .modal input[type="password"] { width: 100%; padding: 9px 11px; border: 1px solid #c7d1de; border-radius: 6px; font-size: 13px; font-family: inherit; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
</style>
</head>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="source/supabase-config.js"></script>
<script src="source/qrcode-mini.js"></script>
<script type="text/babel" src="source/postcard-render.jsx"></script>
<script type="text/babel" src="source/abr-render.jsx?v=2"></script>

<script type="text/babel">
const sb = window.supabase.createClient(
  window.WGU_SUPABASE.url,
  window.WGU_SUPABASE.publishableKey
);

// =========================================================================
// Per-builder configuration. Adding a new builder = add a new entry here.
// =========================================================================

// --- Postcard ---
const POSTCARD_SECTIONS = [
  { id: 'frontCtas', label: 'Front CTAs', singular: 'front CTA', prefix: 'fc',
    help: 'Action line on the front, above the URL. Builder users pick one. Keep it short and punchy.',
    fields: [{ key: 'text', label: 'Text', type: 'text', max: 30 }] },
  { id: 'stats', label: 'Stats Strip', singular: 'stat', prefix: 's',
    help: 'Big-number stats in the lime band on the back. Builder users pick up to 3. Keep numbers very short ("180K+", "$8K") and labels to one or two words.',
    fields: [
      { key: 'num',   label: 'Number', type: 'text', max: 10 },
      { key: 'label', label: 'Label',  type: 'text', max: 30 },
    ]},
  { id: 'facts', label: 'Fast Facts', singular: 'fact', prefix: 'f',
    help: 'Numbered fast-fact lines on the back. Builder users pick up to 5.',
    fields: [{ key: 'text', label: 'Text', type: 'textarea', max: 200 }] },
  { id: 'quotes', label: 'Pull Quotes', singular: 'quote', prefix: 'q',
    help: 'Pull-quote testimonial above the back-side CTA bar. Builder users pick one (or write their own).',
    fields: [
      { key: 'text',        label: 'Quote',       type: 'textarea', max: 220 },
      { key: 'attribution', label: 'Attribution', type: 'text',     max: 80 },
    ]},
  { id: 'backCtas', label: 'Back CTAs', singular: 'back CTA', prefix: 'bc',
    help: 'Two-line action in the navy bar at the bottom of the back side. Use a period to split lines — second half is colored lime.',
    fields: [{ key: 'text', label: 'Text', type: 'text', max: 60 }] },
];

const POSTCARD_BRAND_FIELDS = [
  { key: 'eyebrow_l1',     label: 'Eyebrow line 1',  max: 14, half: true,                           help: '"Strategic"' },
  { key: 'eyebrow_l2',     label: 'Eyebrow line 2',  max: 16, half: true,                           help: '"Partnerships"' },
  { key: 'headline_l1',    label: 'Headline line 1', max: 16, full: true,                           help: 'Top word in the giant headline. Default "Talent."' },
  { key: 'headline_on',    label: 'Headline mid',    max: 8,  half: true,  className: 'sky',        help: 'Sky-blue word. Default "On"' },
  { key: 'headline_demand',label: 'Headline last',   max: 14, half: true,  className: 'lime',       help: 'Lime word. Default "Demand."' },
  { key: 'back_band',      label: 'Back top band',   max: 18, half: true,                           help: '"Fast Facts"' },
  { key: 'back_title',     label: 'Back title',      max: 50, half: true,                           help: '"Why partner with WGU."' },
];

const POSTCARD_DEFAULT_BRAND = {
  eyebrow_l1: 'Strategic', eyebrow_l2: 'Partnerships',
  headline_l1: 'Talent.', headline_on: 'On', headline_demand: 'Demand.',
  back_band: 'Fast Facts', back_title: 'Why partner with WGU.',
};

// --- ABR ---
const ABR_SECTIONS = [
  { id: 'insights', label: 'Insights & Opportunities', singular: 'insight', prefix: 'i',
    help: 'Library of insights. Partner exec picks 3 per ABR.',
    fields: [
      { key: 'title',       label: 'Title',       type: 'text',     max: 60 },
      { key: 'description', label: 'Description', type: 'textarea', max: 220 },
    ]},
  { id: 'programs', label: 'Top Programs Library', singular: 'program', prefix: 'p',
    help: 'Master list of degree programs. Partner exec picks up to 8 per ABR.',
    fields: [{ key: 'text', label: 'Program', type: 'text', max: 80 }] },
  { id: 'contacts', label: 'Contacts Directory', singular: 'contact', prefix: 'c',
    help: 'WGU partnership team members shown in the ABR footer. Partner exec picks up to 2 per report.',
    fields: [
      { key: 'name',  label: 'Name',  type: 'text', max: 60 },
      { key: 'title', label: 'Title', type: 'text', max: 80 },
      { key: 'email', label: 'Email', type: 'text', max: 80 },
    ]},
];

const ABR_BRAND_FIELDS = [
  { key: 'title',                       label: 'Hero title',                max: 50, full: true,  help: '"ANNUAL BUSINESS REPORT"' },
  { key: 'prepared_for_label',          label: '"Prepared for" label',      max: 20, half: true,  help: 'Default: "PREPARED FOR"' },
  { key: 'mission_section',             label: 'Mission section title',     max: 30, half: true,  help: '"MISSION ALIGNMENT"' },
  { key: 'mission_t1_title',            label: 'Mission · 1 title',         max: 16, half: true,  help: 'Default: "Retaining"' },
  { key: 'mission_t1_subtitle',         label: 'Mission · 1 subtitle',      max: 24, half: true,  help: '"Your Workforce"' },
  { key: 'mission_t2_title',            label: 'Mission · 2 title',         max: 16, half: true,  help: 'Default: "Upskilling"' },
  { key: 'mission_t2_subtitle',         label: 'Mission · 2 subtitle',      max: 24, half: true,  help: '"Your Workforce"' },
  { key: 'mission_t3_title',            label: 'Mission · 3 title',         max: 16, half: true,  help: 'Default: "Expanding"' },
  { key: 'mission_t3_subtitle',         label: 'Mission · 3 subtitle',      max: 24, half: true,  help: '"Your Workforce"' },
  { key: 'partnership_section',         label: 'Partnership section title', max: 30, full: true,  help: '"PARTNERSHIP OVERVIEW"' },
  { key: 'partnership_total_label',     label: 'Big-circle label',          max: 24, half: true,  help: 'Default: "Total Graduates"' },
  { key: 'partnership_a_label',         label: 'Stat A label',              max: 24, half: true,  help: 'Default: "Current Enrollment"' },
  { key: 'partnership_b_label',         label: 'Stat B label',              max: 24, half: true,  help: '"FY26 Starts" — bump yearly' },
  { key: 'partnership_c_label',         label: 'Stat C label',              max: 24, half: true,  help: '"FY25 Starts" — bump yearly' },
  { key: 'program_mix_section',         label: 'Program-mix title',         max: 30, full: true,  help: '"PROGRAM MIX FY26" — bump yearly' },
  { key: 'program_1_label',             label: 'Program 1 label',           max: 16, half: true,  help: 'Default: "Business"' },
  { key: 'program_2_label',             label: 'Program 2 label',           max: 16, half: true,  help: 'Default: "Technology"' },
  { key: 'program_3_label',             label: 'Program 3 label',           max: 16, half: true,  help: 'Default: "Education"' },
  { key: 'program_4_label',             label: 'Program 4 label',           max: 16, half: true,  help: 'Default: "Health"' },
  { key: 'stats_section',               label: 'Stats section title',       max: 20, full: true,  help: '"STATS"' },
  { key: 'stats_timeline_label',        label: 'Timeline lead-in',          max: 60, full: true,  help: '"Total degrees awarded over time"' },
  { key: 'stats_completion_message',    label: 'Completion message',        max: 140, full: true, help: '"Completion rates with partner organizations are higher than national WGU rates."' },
  { key: 'stats_partner_rate_label',    label: 'Partner rate label',        max: 40, half: true,  help: '"Completion rates with partner"' },
  { key: 'stats_nonpartner_rate_label', label: 'Non-partner rate label',    max: 40, half: true,  help: '"Non-partner completion rates"' },
  { key: 'top_programs_section',        label: 'Top Programs title',        max: 30, full: true,  help: '"TOP PROGRAMS FY26" — bump yearly' },

function genExternalId(prefix) { return prefix + '-' + Math.random().toString(36).slice(2, 8); }
function genUUID() {
  if (window.crypto && window.crypto.randomUUID) return window.crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
    const r = Math.random() * 16 | 0;
    const v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}
const equal = (a, b) => JSON.stringify(a) === JSON.stringify(b);

// =========================================================================
// Diff: turn (saved, draft) into a list of database operations.
// builderId is captured so cross-builder switching doesn't pollute ops.
// =========================================================================
function computeOperations(saved, draft, builderId) {
  const ops = [];
  if (!equal(saved.brand, draft.brand)) {
    ops.push({ type: 'update_brand', builderId, brandRowId: saved.brandRowId, old: saved.brand, new: draft.brand });
  }
  const savedById = new Map(saved.items.map((i) => [i.id, i]));
  for (const di of draft.items) {
    if (di._new && !di._deleted) {
      ops.push({
        type: 'insert',
        row: { id: di.id, builder_id: builderId, section: di.section, external_id: di.external_id, sort_order: di.sort_order, content: di.content },
      });
    }
  }
  for (const si of saved.items) {
    const di = draft.items.find((x) => x.id === si.id);
    if (!di || di._deleted) ops.push({ type: 'delete', row: si });
  }
  for (const di of draft.items) {
    if (di._new || di._deleted) continue;
    const si = savedById.get(di.id);
    if (!si) continue;
    if (!equal(si.content, di.content) || si.sort_order !== di.sort_order) {
      ops.push({
        type: 'update', id: di.id,
        old: { content: si.content, sort_order: si.sort_order },
        new: { content: di.content, sort_order: di.sort_order },
      });
    }
  }
  return ops;
}

function invertOp(op) {
  if (op.type === 'update_brand') return { ...op, old: op.new, new: op.old };
  if (op.type === 'update')      return { ...op, old: op.new, new: op.old };
  if (op.type === 'insert')      return { type: 'delete', row: op.row };
  if (op.type === 'delete')      return { type: 'insert', row: op.row };
  return op;
}

async function applyOp(op) {
  if (op.type === 'update_brand') {
    if (op.brandRowId) {
      const { error } = await sb.from('library_items').update({ content: op.new }).eq('id', op.brandRowId);
      if (error) throw error;
    } else {
      const { error } = await sb.from('library_items').insert({
        builder_id: op.builderId, section: 'fixed_text', external_id: 'main',
        sort_order: 0, content: op.new,
      });
      if (error) throw error;
    }
  } else if (op.type === 'insert') {
    const { error } = await sb.from('library_items').insert(op.row);
    if (error) throw error;
  } else if (op.type === 'update') {
    const { error } = await sb.from('library_items').update(op.new).eq('id', op.id);
    if (error) throw error;
  } else if (op.type === 'delete') {
    const { error } = await sb.from('library_items').delete().eq('id', op.row.id);
    if (error) throw error;
  }
}

function changeSummary(ops) {
  const counts = { insert: 0, update: 0, delete: 0, brand: 0 };
  for (const op of ops) {
    if (op.type === 'update_brand') counts.brand++;
    else counts[op.type]++;
  }
  return counts;
}

function SignIn() {
  const [email, setEmail] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [method, setMethod] = React.useState('password');
  const [status, setStatus] = React.useState('idle');
  const [error, setError] = React.useState('');

  React.useEffect(() => {
    const hash = window.location.hash;
    if (hash.includes('error=')) {
      const params = new URLSearchParams(hash.substring(1));
      const desc = params.get('error_description');
      if (desc) setError(desc.replace(/\+/g, ' '));
      window.history.replaceState(null, '', window.location.pathname);
    }
  }, []);

  const submit = async (e) => {
    e?.preventDefault();
    if (!email.trim()) return;
    setStatus('sending'); setError('');
    try {
      if (method === 'magic') {
        const { error } = await sb.auth.signInWithOtp({
          email: email.trim().toLowerCase(),
          options: { emailRedirectTo: window.location.href.split('#')[0], shouldCreateUser: false },
        });
        if (error) throw error;
        setStatus('sent');
      } else {
        const { error } = await sb.auth.signInWithPassword({ email: email.trim().toLowerCase(), password });
        if (error) throw error;
      }
    } catch (e) { setStatus('error'); setError(e.message || 'Sign in failed.'); }
  };

  const signInWithGoogle = async () => {
    setStatus('sending'); setError('');
    try {
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.href.split('#')[0],
          // hd hint: Google skips the account picker if the user only has one wgu.edu account,
          // and bounces them at Google's end if they pick a non-wgu.edu account.
          queryParams: { hd: 'wgu.edu' },
        },
      });
      if (error) throw error;
      // signInWithOAuth navigates to Google; the rest happens after redirect.
    } catch (e) { setStatus('error'); setError(e.message || 'Google sign-in failed.'); }
  };

  return (
    <div className="signin-wrap">
      <div className="signin-card">
        <h1>Library Admin</h1>
        <p className="sub">Sign in to edit the content libraries that power the WGU builder family.</p>
        {status !== 'sent' ? (
          <>
            <button type="button" className="btn-google" onClick={signInWithGoogle} disabled={status === 'sending'}>
              <svg viewBox="0 0 48 48" aria-hidden="true">
                <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
                <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
                <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
                <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.087 5.571l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
              </svg>
              {status === 'sending' ? 'Redirecting…' : 'Continue with Google'}
            </button>
            <div className="divider">or sign in with email</div>
            <div className="method-toggle">
              <button type="button" className={method === 'password' ? 'active' : ''} onClick={() => { setMethod('password'); setError(''); }}>Password</button>
              <button type="button" className={method === 'magic' ? 'active' : ''} onClick={() => { setMethod('magic'); setError(''); }}>Magic link</button>
            </div>
            <form onSubmit={submit}>
              <label htmlFor="email">Email</label>
              <input id="email" type="email" required value={email} onChange={(e) => setEmail(e.target.value)} placeholder="you@example.com" disabled={status === 'sending'} autoFocus />
              {method === 'password' && (
                <div style={{ marginTop: 14 }}>
                  <label htmlFor="password">Password</label>
                  <input id="password" type="password" required value={password} onChange={(e) => setPassword(e.target.value)} disabled={status === 'sending'} />
                </div>
              )}
              <button type="submit" className="btn btn-primary" style={{ marginTop: 16, width: '100%', justifyContent: 'center' }} disabled={status === 'sending' || !email.trim() || (method === 'password' && !password)}>
                {status === 'sending' ? (method === 'magic' ? 'Sending…' : 'Signing in…') : (method === 'magic' ? 'Send magic link' : 'Sign in')}
              </button>
              {error && <div className="err-box">{error}</div>}
            </form>
          </>
        ) : (
          <div>
            <div className="info-box">
              ✓ Check your email — we sent a sign-in link to <strong>{email}</strong>.
            </div>
            <button className="btn btn-outline" onClick={() => { setStatus('idle'); setEmail(''); setError(''); }}>Use a different email</button>
          </div>
        )}
        <p className="footer-note">
          Only invited users can sign in. If your email isn't on the list, ask the builder admin to add it in Supabase Authentication → Users.
        </p>
      </div>
    </div>
  );
}

function ChangePasswordModal({ onClose, showToast }) {
  const [pw, setPw] = React.useState('');
  const [pw2, setPw2] = React.useState('');
  const [err, setErr] = React.useState('');
  const [submitting, setSubmitting] = React.useState(false);
  const submit = async (e) => {
    e?.preventDefault(); setErr('');
    if (pw.length < 6) { setErr('Password must be at least 6 characters.'); return; }
    if (pw !== pw2)    { setErr('Passwords do not match.'); return; }
    setSubmitting(true);
    const { error } = await sb.auth.updateUser({ password: pw });
    setSubmitting(false);
    if (error) { setErr(error.message); return; }
    showToast('Password updated.');
    onClose();
  };
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <h2>Change password</h2>
        <p className="sub">Set a new password for your admin account.</p>
        <form onSubmit={submit}>
          <label>New password</label>
          <input type="password" value={pw} onChange={(e) => setPw(e.target.value)} required autoFocus />
          <label>Confirm new password</label>
          <input type="password" value={pw2} onChange={(e) => setPw2(e.target.value)} required />
          {err && <div style={{ color: '#dc2626', fontSize: 12, marginTop: 12 }}>{err}</div>}
          <div className="modal-actions">
            <button type="button" className="btn btn-outline" onClick={onClose} disabled={submitting}>Cancel</button>
            <button type="submit" className="btn btn-primary" disabled={submitting || !pw || !pw2}>{submitting ? 'Saving…' : 'Save'}</button>
          </div>
        </form>
      </div>
    </div>
  );
}

function ItemRow({ item, idx, total, sectionDef, savedItem, onChange, onMove, onDelete, onRestore }) {
  const setField = (key, val) => onChange(item.id, { ...item.content, [key]: val });
  const isEdited = !item._new && !item._deleted && savedItem && !equal(savedItem.content, item.content);
  return (
    <div className={`item ${item._new ? 'is-new' : ''} ${item._deleted ? 'is-deleted' : ''}`}>
      <div className="item-num">{idx + 1}</div>
      <div className="item-fields">
        <div style={{ display: 'flex', gap: 6, alignItems: 'center', minHeight: 16 }}>
          {item._new && <span className="badge badge-new">New</span>}
          {item._deleted && <span className="badge badge-deleted">Will delete</span>}
          {isEdited && <span className="badge badge-edited">Edited</span>}
        </div>
        {sectionDef.fields.map((f) => {
          const val = item.content[f.key] || '';
          const len = val.length;
          const counterCls = len > f.max ? 'over' : (len > f.max * 0.9 ? 'warn' : '');
          return (
            <div key={f.key} className="field-row" style={{ alignItems: f.type === 'textarea' ? 'flex-start' : 'center' }}>
              {sectionDef.fields.length > 1 && <span className="field-label">{f.label}</span>}
              <div className="field-input-wrap">
                {f.type === 'textarea' ? (
                  <textarea value={val} onChange={(e) => setField(f.key, e.target.value)} disabled={item._deleted} maxLength={f.max + 60} />
                ) : (
                  <input type="text" value={val} onChange={(e) => setField(f.key, e.target.value)} disabled={item._deleted} maxLength={f.max + 30} />
                )}
                <span className={`counter ${counterCls}`}>{len}/{f.max}</span>
              </div>
            </div>
          );
        })}
      </div>
      <div className="item-actions">
        {!item._deleted ? (
          <>
            <button className="icon-btn" disabled={idx === 0} onClick={() => onMove(item.id, -1)} title="Move up">▲</button>
            <button className="icon-btn" disabled={idx === total - 1} onClick={() => onMove(item.id, 1)} title="Move down">▼</button>
            <button className="icon-btn delete" onClick={() => onDelete(item.id)} title="Delete">✕</button>
          </>
        ) : (
          <button className="icon-btn restore" onClick={() => onRestore(item.id)} title="Restore">↶ Restore</button>
        )}
      </div>
    </div>
  );
}

    const brandRow = all.find((x) => x.section === 'fixed_text');
    return {
      brand: brandRow ? { ...cfg.defaultBrand, ...(brandRow.content || {}) } : { ...cfg.defaultBrand },
      brandRowId: brandRow ? brandRow.id : null,
      items: itemsArr,
    };
  }, [builderId]);

  React.useEffect(() => {
    setLoadError('');
    fetchAll().then((s) => {
      if (s) { setSaved(s); setDraft(deepClone(s)); setLastOps(null); setSavedAt(null); }
    });
  }, [fetchAll]);

  const isDirty = React.useMemo(() => {
    if (!saved || !draft) return false;
    return !equal(saved, draft);
  }, [saved, draft]);

  React.useEffect(() => {
    if (!isDirty) return;
    const handler = (e) => { e.preventDefault(); e.returnValue = ''; return ''; };
    window.addEventListener('beforeunload', handler);
    return () => window.removeEventListener('beforeunload', handler);
  }, [isDirty]);

  const pendingOps = React.useMemo(() => {
    if (!saved || !draft) return [];
    return computeOperations(saved, draft, builderId);
  }, [saved, draft, builderId]);
  const pendingCount = pendingOps.length;
  const canUndo = lastOps !== null && !isDirty;

  const showToast = (msg, isError = false) => {
    setToast({ msg, isError });
    setTimeout(() => setToast(null), 3000);
  };

  const clearUndoIfSet = () => { if (lastOps !== null) setLastOps(null); };

  const updateBrand = (newBrand) => { setDraft((d) => ({ ...d, brand: newBrand })); clearUndoIfSet(); };
  const updateItemContent = (id, content) => {
    setDraft((d) => ({ ...d, items: d.items.map((it) => it.id === id ? { ...it, content } : it) }));
    clearUndoIfSet();
  };
  const moveItem = (id, delta) => {
    setDraft((d) => {
      const item = d.items.find((i) => i.id === id);
      if (!item || item._deleted) return d;
      const sectionItems = d.items.filter((x) => x.section === item.section && !x._deleted)
        .sort((a, b) => a.sort_order - b.sort_order);
      const idx = sectionItems.findIndex((x) => x.id === id);
      const targetIdx = idx + delta;
      if (targetIdx < 0 || targetIdx >= sectionItems.length) return d;
      const a = sectionItems[idx], b = sectionItems[targetIdx];
      return {
        ...d,
        items: d.items.map((x) => {
          if (x.id === a.id) return { ...x, sort_order: b.sort_order };
          if (x.id === b.id) return { ...x, sort_order: a.sort_order };
          return x;
        }),
      };
    });
    clearUndoIfSet();
  };
  const deleteItem = (id) => {
    setDraft((d) => {
      const item = d.items.find((i) => i.id === id);
      if (!item) return d;
      if (item._new) return { ...d, items: d.items.filter((x) => x.id !== id) };
      return { ...d, items: d.items.map((x) => x.id === id ? { ...x, _deleted: true } : x) };
    });
    clearUndoIfSet();
  };
  const restoreItem = (id) => {
    setDraft((d) => ({ ...d, items: d.items.map((x) => x.id === id ? { ...x, _deleted: false } : x) }));
    clearUndoIfSet();
  };
  const addItem = (sectionId) => {
    const def = builderConfig.sections.find((s) => s.id === sectionId);
    const blankContent = def.fields.reduce((o, f) => { o[f.key] = ''; return o; }, {});
    setDraft((d) => {
      const sectionItems = d.items.filter((x) => x.section === sectionId && !x._deleted);
      const maxSort = sectionItems.reduce((m, x) => Math.max(m, x.sort_order), 0);
      return {
        ...d,
        items: [...d.items, {
          id: genUUID(), section: sectionId,
          external_id: genExternalId(def.prefix),
          sort_order: maxSort + 1,
          content: blankContent,
          _new: true,
        }],
      };
    });
    clearUndoIfSet();
  };

  const save = async () => {
    setBusy('saving');
    try {
      const ops = computeOperations(saved, draft, builderId);
      if (ops.length === 0) return;
      for (const op of ops) await applyOp(op);
      const fresh = await fetchAll();
      if (fresh) {
        setSaved(fresh); setDraft(deepClone(fresh));
        setLastOps(ops); setSavedAt(new Date());
        const c = changeSummary(ops);
        const parts = [];
        if (c.brand) parts.push('brand text');
        if (c.insert) parts.push(`${c.insert} added`);
        if (c.update) parts.push(`${c.update} edited`);
        if (c.delete) parts.push(`${c.delete} deleted`);
        showToast(`Saved · ${parts.join(' · ')}`);
      }
    } catch (e) {
      console.error(e);
      showToast('Save failed: ' + (e.message || ''), true);
    } finally { setBusy('idle'); }
  };

  const undo = async () => {
    if (!lastOps) return;
    if (!confirm('Undo your last save? This reverts the changes you just made.')) return;
    setBusy('undoing');
    try {
      const inverted = [...lastOps].reverse().map(invertOp);
      for (const op of inverted) await applyOp(op);
      const fresh = await fetchAll();
      if (fresh) {
        setSaved(fresh); setDraft(deepClone(fresh));
        setLastOps(null); setSavedAt(null);
        showToast('Last save undone.');
      }
    } catch (e) {
      console.error(e);
      showToast('Undo failed: ' + (e.message || ''), true);
    } finally { setBusy('idle'); }
  };

  const discard = () => {
    if (pendingCount === 0) return;
    if (!confirm(`Discard ${pendingCount} unsaved change${pendingCount === 1 ? '' : 's'}?`)) return;
    setDraft(deepClone(saved));
  };

  const switchBuilder = (newBuilderId) => {
    if (newBuilderId === builderId) return;
    if (isDirty && !confirm('You have unsaved changes. Switching builders will discard them. Continue?')) return;
    setSaved(null); setDraft(null); setLastOps(null); setSavedAt(null);
    setBuilderId(newBuilderId);
  };

  const signOut = async () => {
    if (isDirty && !confirm('You have unsaved changes. Sign out anyway?')) return;
    await sb.auth.signOut();
  };

  if (loadError) return (
    <div style={{ padding: 32, color: '#dc2626', fontFamily: "'Jost', sans-serif" }}>
      <h2 style={{ fontFamily: "'Oswald', sans-serif", textTransform: 'uppercase' }}>Couldn't load library</h2>
      <pre style={{ background: '#fff1f1', padding: 12, borderRadius: 6, fontSize: 12 }}>{loadError}</pre>
    </div>
  );
  if (!draft || !saved) return <div style={{ padding: 32, color: '#264468' }}>Loading library…</div>;

  // Build preview from draft
  const itemsBy = (sec) => draft.items.filter((x) => x.section === sec && !x._deleted).sort((a, b) => a.sort_order - b.sort_order);
  const previewData = builderConfig.buildPreviewData(draft, itemsBy);

  return (
    <div className="app">
      <div className="form-panel">
        <div className="form-header">
          <div className="top-row">
            <div className="title-block">
              <h1>Library Admin</h1>
              <p>WGU builder family · edit content + brand text. Save publishes to all builder users.</p>
            </div>
            <div className="header-actions">
              <span className="user-line">{session.user.email}</span>
              <a href={builderConfig.builderUrl} target="_blank" rel="noopener">Open builder ↗</a>
              <button onClick={() => setShowPwModal(true)}>Change password</button>
              <button className="signout" onClick={signOut}>Sign out</button>
            </div>
          </div>
          <div className="builder-picker">
            <label htmlFor="builder-select">Builder:</label>
            <select id="builder-select" value={builderId} onChange={(e) => switchBuilder(e.target.value)}>
              {BUILDER_IDS.map((id) => (
                <option key={id} value={id}>{BUILDERS_CONFIG[id].label}</option>
              ))}
            </select>
          </div>
        </div>

        <BrandTextSection brand={draft.brand} savedBrand={saved.brand} fields={builderConfig.brandFields} onChange={updateBrand} />

        {builderConfig.sections.map((sec, i) => {
          const sectionDraft = draft.items.filter((x) => x.section === sec.id).sort((a, b) => a.sort_order - b.sort_order);
          const sectionSaved = saved.items.filter((x) => x.section === sec.id);
          return (
            <LibrarySection
              key={sec.id} stepIdx={i + 1} sectionDef={sec}
              items={sectionDraft} savedItems={sectionSaved}
              onItemChange={updateItemContent} onMove={moveItem}
              onDelete={deleteItem} onRestore={restoreItem} onAdd={addItem}
            />
          );
        })}

        <SaveBar
          pendingCount={pendingCount} isDirty={isDirty} canUndo={canUndo} busy={busy}
          onSave={save} onDiscard={discard} onUndo={undo} savedAt={savedAt}
        />
      </div>

      <div className="preview-panel">
        <div className="preview-toolbar">
          <span className={`pill ${isDirty ? 'draft-pill' : 'live-pill'}`}>
            {isDirty ? `● Draft preview · ${pendingCount} unsaved` : '● Live preview'}
          </span>
          <span className="pill">{builderConfig.label}</span>
          <a href={builderConfig.builderUrl} target="_blank" rel="noopener" style={{ marginLeft: 'auto', fontSize: 11, color: '#0070F0', fontWeight: 600, textDecoration: 'none', textTransform: 'uppercase', letterSpacing: '0.06em' }}>Open builder ↗</a>
        </div>
        <div className="preview-help">
          <strong>What you're seeing:</strong> the {builderConfig.label.toLowerCase()} rendered with your <em>draft</em> brand text and the first item from each library. Edits show here immediately. The public builder still shows the last saved version until you hit Save.
        </div>
        {builderConfig.renderPreview(previewData)}
      </div>

      {toast && <div className={`toast ${toast.isError ? 'error' : ''}`}>{toast.msg}</div>}
      {showPwModal && <ChangePasswordModal onClose={() => setShowPwModal(false)} showToast={showToast} />}
    </div>
  );
}

// =========================================================================
// Top-level: routes between sign-in and admin based on session state
// =========================================================================
function App() {
  const [session, setSession] = React.useState(null);
  const [loaded, setLoaded] = React.useState(false);

  React.useEffect(() => {
    sb.auth.getSession().then(({ data }) => { setSession(data.session); setLoaded(true); });
    const { data } = sb.auth.onAuthStateChange((_e, s) => { setSession(s); });
    return () => data.subscription.unsubscribe();
  }, []);

  if (!loaded) return <div style={{ padding: 32, color: '#264468', fontFamily: "'Jost', sans-serif" }}>Loading…</div>;
  if (!session) return <SignIn />;
  return <Admin session={session} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
